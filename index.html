<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Banco de libros</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body { font-family: Arial; text-align:center; padding:20px; }
    #reader { width:300px; margin:auto; }
    button { margin:10px; padding:10px; }
  </style>
</head>

<body>

<h2>📚 Banco de libros</h2>

<p id="estado">Listo</p>

<div id="reader"></div>

<button onclick="scanAlumno()">Escanear alumno</button>
<button onclick="scanAsignatura()">Escanear asignatura</button>
<button onclick="enviar()">Registrar</button>

<script>

let alumno = "";
let asignatura = "";

let scanner = new Html5Qrcode("reader");


// 🔴🔴🔴 AQUÍ ES DONDE TIENES QUE PEGAR TU URL DE APPS SCRIPT
const API_URL = "https://script.google.com/macros/s/AKfycbwrITaXNR5XwtKATZZ23dyheukbVLlP1DqoiTRhgbxBCmOii9vmqiV9RBoGgxXBqgeC/exec";


function startScan(callback) {

  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (text) => {

      scanner.stop();
      callback(text);

    }
  );
}

function scanAlumno() {
  startScan((text) => {

    alumno = text.trim().toUpperCase();

    document.getElementById("estado").innerText =
      "Alumno: " + alumno;
  });
}

function scanAsignatura() {
  startScan((text) => {

    asignatura = text.trim().toUpperCase();

    document.getElementById("estado").innerText =
      "Alumno: " + alumno + " | Asignatura: " + asignatura;
  });
}

function enviar() {

  if (!alumno || !asignatura) {
    alert("Faltan datos");
    return;
  }

  const url = API_URL
    + "?alumno=" + encodeURIComponent(alumno)
    + "&asignatura=" + encodeURIComponent(asignatura);

  // 🔴 Envío compatible (evita problemas de CORS)
  const img = new Image();
  img.src = url;

  alert("Enviado");

  alumno = "";
  asignatura = "";
  document.getElementById("estado").innerText = "Listo";
}

</script>

</body>
</html>
