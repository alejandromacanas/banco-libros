<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Banco de libros</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body { font-family: Arial; text-align:center; padding:20px; }
    #reader { width:300px; margin:auto; }
    button { margin:10px; padding:10px; }
  </style>
</head>

<body>

<h2>📚 Banco de libros</h2>

<p id="estado">Listo</p>

<div id="reader"></div>

<button onclick="scanAlumno()">Escanear alumno</button>
<button onclick="scanAsignatura()">Escanear asignatura</button>
<button onclick="enviar()">Registrar</button>

<script>

let alumno = "";
let asignatura = "";

let scanner = new Html5Qrcode("reader");

// 🔴 TU URL DE APPS SCRIPT
const API_URL = "https://script.google.com/macros/s/AKfycbxjrtzDbpp9wafMDeY_9liAO1I01ZXN2t2locPZrWw185QGIiookru2zmH-q2Lctp6v/exec";


// 🔧 FUNCIÓN CLAVE: limpia QR (texto o URL)
function extraerCodigo(text) {

  text = text.trim();

  if (text.includes("http")) {

    try {
      const url = new URL(text);

      const data =
        url.searchParams.get("data") ||
        url.searchParams.get("alumno") ||
        url.searchParams.get("id");

      if (data) return data.toUpperCase();

      return url.pathname.split("/").pop().toUpperCase();

    } catch (e) {
      return text.toUpperCase();
    }
  }

  return text.toUpperCase();
}


// 🔴 SCANNER
function startScan(callback) {

  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (text) => {

      scanner.stop();
      callback(text);

    }
  );
}


// 👤 ALUMNO
function scanAlumno() {
  startScan((text) => {

    alumno = extraerCodigo(text);

    document.getElementById("estado").innerText =
      "Alumno: " + alumno;
  });
}


// 📚 ASIGNATURA
function scanAsignatura() {
  startScan((text) => {

    asignatura = extraerCodigo(text);

    document.getElementById("estado").innerText =
      "Alumno: " + alumno + " | Asignatura: " + asignatura;
  });
}


// 🚀 ENVIAR
function enviar() {

  if (!alumno || !asignatura) {
    alert("Faltan datos");
    return;
  }

  const url = API_URL
    + "?alumno=" + encodeURIComponent(alumno)
    + "&asignatura=" + encodeURIComponent(asignatura);

  fetch(url, { mode: "no-cors" });

  alert("Enviado");

  alumno = "";
  asignatura = "";
  document.getElementById("estado").innerText = "Listo";
}

</script>

</body>
</html>
